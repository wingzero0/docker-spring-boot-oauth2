# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:roleserver;MODE=MariaDB;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate create entity-mapped tables (oauth2_registered_client, app_user, app_user_role + seq)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# Run data.sql AFTER Hibernate has created the tables, to seed test data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/inmemory/data.sql

# OAuth2 Authorization Server
application.oauth.checktoken.uri=http://localhost:8087/auth/oauth2/introspect