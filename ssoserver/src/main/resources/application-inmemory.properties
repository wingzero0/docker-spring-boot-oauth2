# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:ssoserver;MODE=MariaDB;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate create entity-mapped tables (oauth2_registered_client, app_user, app_user_role + seq)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# Run schema.sql AFTER Hibernate so the unmapped OAuth2 JDBC tables get created
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/inmemory/schema.sql

# Bootstrap a default OAuth2 client on startup, like dev profile
application.init.oauth2registeredclient=true
